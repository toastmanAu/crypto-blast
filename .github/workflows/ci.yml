name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  # ── 1. TypeScript engine ────────────────────────────────────────────────────
  ts:
    name: TS (vitest + vite build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests (vitest, 85 tests)
        run: npm test

      # `npm run build` (tsc && vite build) fails because scripts/build-verify-tx.ts
      # is pulled in transitively via tests/buildVerifyTx.test.ts and uses node:fs /
      # node:process which are not in the tsconfig types list.  The vite bundle
      # (which excludes that script) builds cleanly, so we run it directly.
      - name: Build (vite bundle)
        run: npx vite build

  # ── 2. Rust verifier library (host conformance + riscv64 no_std) ────────────
  rust:
    name: Rust verifier (conformance + riscv64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + riscv64 target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv64imac-unknown-none-elf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifier

      - name: Host conformance tests (16 tests)
        working-directory: verifier
        run: cargo test

      - name: Cross-compile no_std for riscv64
        working-directory: verifier
        run: cargo build --no-default-features --target riscv64imac-unknown-none-elf

  # ── 3. On-chain contract (riscv64 release + ckb-testtool) ──────────────────
  contract:
    name: Contract (riscv64 build + ckb-testtool)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # verifier/contract/rust-toolchain.toml pins channel = "1.95" with
      # targets = ["riscv64imac-unknown-none-elf"].  Install that exact toolchain
      # and target here so the cache key is stable and cargo picks it up.
      - name: Install Rust 1.95 + riscv64 target (matches rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@1.95
        with:
          targets: riscv64imac-unknown-none-elf

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: verifier/contract

      # Build the riscv64 binary FIRST — tests/verify.rs reads the release binary
      # at target/riscv64imac-unknown-none-elf/release/verifier-lock.
      # The .cargo/config.toml in verifier/contract/ supplies the required
      # rustflags: -C target-feature=-a,+forced-atomics (disables ISA atomics,
      # forces __atomic_* libcall lowering for CKB-VM compatibility).
      - name: Build contract binary (riscv64 release)
        working-directory: verifier/contract
        run: cargo build --release --target riscv64imac-unknown-none-elf

      - name: Run ckb-testtool acceptance tests (3 tests)
        working-directory: verifier/contract
        run: cargo test
